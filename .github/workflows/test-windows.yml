name: Windows Tests

on:
  push:
    branches: [main]
    paths:
      - "internal/**"
      - "cmd/**"
      - ".github/workflows/test-windows.yml"
  pull_request:
    branches: [main]
    paths:
      - "internal/**"
      - "cmd/**"
      - ".github/workflows/test-windows.yml"

jobs:
  test-windows:
    name: Windows Validation
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build CLI
        run: go build -v -o recipe.exe ./cmd/cli

      - name: Verify CLI binary
        run: ./recipe.exe --help

      - name: Run Unit Tests
        run: go test -v ./internal/...
